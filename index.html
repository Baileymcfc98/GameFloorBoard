<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Immersive Board Game Template V2</title>
  <style>
    :root{
      --bg:#070707; --surface:rgba(18,18,24,.9); --surface2:rgba(35,32,38,.94); --text:#fff; --muted:#d8d2c5;
      --accent:#e3b04b; --accent2:#7ccf7a; --border:rgba(240,195,106,.78); --shadow:0 18px 45px rgba(0,0,0,.45);
      --radius:20px; --gap:10px; --font:Arial,Helvetica,sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
    button{font:inherit;color:inherit}
    #bgLayer{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at center,rgba(227,176,75,.22),transparent 38%),linear-gradient(135deg,#090909,#19130c 45%,#080808)}
    #bgLayer img,#bgLayer video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;filter:saturate(1.08) contrast(1.04)}
    #bgLayer:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(0,0,0,.04),rgba(0,0,0,.65)),linear-gradient(90deg,rgba(0,0,0,.45),transparent 18%,transparent 82%,rgba(0,0,0,.45))}
    #app{position:relative;z-index:1;width:100vw;height:100vh;padding:14px;display:grid;grid-template-rows:84px 1fr;gap:12px}
    .topbar{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:12px;align-items:center}
    .brand{height:100%;border:2px solid rgba(240,195,106,.35);background:linear-gradient(180deg,rgba(18,18,24,.86),rgba(5,5,7,.82));border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:var(--shadow);padding:8px 18px;position:relative;overflow:hidden}
    .brand:before{content:"";position:absolute;inset:7px;border:1px solid rgba(255,255,255,.12);border-radius:17px;pointer-events:none}
    .brand h1{font-size:clamp(1.35rem,2.2vw,2.4rem);margin:0;letter-spacing:.05em;text-transform:uppercase;line-height:1}
    .brand p{margin:6px 0 0;color:var(--muted);font-size:clamp(.82rem,1vw,1rem)}
    .controls{display:flex;gap:10px;align-items:center}.controls.right{justify-content:flex-end}
    .btn,.select{border:1px solid rgba(240,195,106,.35);background:linear-gradient(180deg,rgba(45,38,28,.95),rgba(18,18,24,.94));border-radius:16px;min-height:58px;padding:12px 16px;font-weight:800;box-shadow:var(--shadow);cursor:pointer}
    .btn:active,.tile:active,.panel:active{transform:scale(.985)}
    .dice-pill{min-height:58px;min-width:92px;display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid rgba(240,195,106,.35);background:rgba(18,18,24,.9);border-radius:16px;font-weight:900;font-size:1.15rem;box-shadow:var(--shadow)}
    #board{min-height:0;display:grid;grid-template-columns:1.18fr repeat(8,1fr) 1.18fr;grid-template-rows:1.08fr repeat(6,1fr) 1.08fr;gap:var(--gap);position:relative}
    .tile,.corner,.center{position:relative;overflow:hidden;border-radius:var(--radius);border:2px solid var(--border);box-shadow:var(--shadow);background:rgba(13,12,13,.9)}
    .tile,.corner{cursor:pointer;min-width:0;min-height:0}.tile:hover,.corner:hover,.panel:hover{outline:3px solid rgba(255,255,255,.18)}
    .media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.12) 55%,rgba(255,255,255,.04)),radial-gradient(circle at 50% 0,rgba(255,220,130,.2),transparent 42%)}
    .tile-inner{position:absolute;inset:0;z-index:2;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;text-align:left}.icon{position:absolute;right:9px;top:9px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:5px 9px;font-size:clamp(.9rem,1.1vw,1.15rem)}
    .title{font-weight:900;font-size:clamp(.74rem,1vw,1rem);line-height:1.08;text-shadow:0 2px 4px #000}.subtitle{margin-top:3px;color:#f1e6d0;font-size:clamp(.62rem,.78vw,.82rem);line-height:1.12;text-shadow:0 2px 4px #000}
    .corner .title{font-size:clamp(.82rem,1.2vw,1.16rem);text-transform:uppercase}.corner .tile-inner{align-items:center;text-align:center;justify-content:center;padding:12px}.corner .icon{position:static;margin-bottom:6px;font-size:1.4rem}
    .center{grid-column:2/10;grid-row:2/8;border-width:3px;background:rgba(8,8,12,.92)}
    .center-content{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:24px;pointer-events:none}.center-card{margin-top:3%;max-width:74%;text-align:center;background:rgba(0,0,0,.48);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:18px 28px;box-shadow:var(--shadow)}
    .center-card h2{font-size:clamp(2rem,4vw,5rem);margin:0;text-transform:uppercase;letter-spacing:.04em}.center-card p{font-size:clamp(1rem,1.4vw,1.35rem);margin:8px 0 0;color:#f2e4c4}.badges{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}.badge{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:10px 16px;font-weight:800;color:#f6e8c4}
    .panel{position:absolute;z-index:3;border:2px solid rgba(240,195,106,.7);border-radius:18px;overflow:hidden;background:rgba(20,18,20,.88);box-shadow:var(--shadow);cursor:pointer;pointer-events:auto}.panel .title{font-size:clamp(.75rem,1vw,.95rem)}
    .token-stack{position:absolute;z-index:5;left:8px;top:8px;display:flex;gap:5px;flex-wrap:wrap;max-width:calc(100% - 16px)}.token{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;border:2px solid white;box-shadow:0 8px 18px rgba(0,0,0,.5);font-size:.9rem}
    #teacherPanel{position:fixed;z-index:30;right:14px;top:112px;width:min(410px,92vw);max-height:calc(100vh - 128px);overflow:auto;background:rgba(8,8,12,.97);border:2px solid rgba(240,195,106,.45);border-radius:24px;padding:18px;box-shadow:var(--shadow)}.hidden{display:none!important}.teacher-section{border-top:1px solid rgba(255,255,255,.12);padding-top:14px;margin-top:14px}.teacher-section h3,.teacher-section h4{margin:0 0 10px}.teacher-section p{color:var(--muted);line-height:1.35}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.select{width:100%;background:rgba(30,30,38,.96)}.bigdice{text-align:center;font-size:2.6rem;font-weight:900;background:rgba(255,255,255,.08);border-radius:18px;padding:10px;margin-bottom:10px}.note{color:var(--muted);font-size:.92rem;margin-top:10px;line-height:1.35}
    #modal{position:fixed;z-index:50;inset:0;background:rgba(0,0,0,.72);display:grid;place-items:center;padding:22px}.modal-card{width:min(980px,94vw);max-height:90vh;overflow:auto;background:linear-gradient(180deg,rgba(24,22,28,.98),rgba(8,8,12,.98));border:2px solid rgba(240,195,106,.5);border-radius:26px;padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.7)}.modal-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.modal-head h2{font-size:clamp(1.5rem,2.4vw,2.4rem);margin:0}.close{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.1);border-radius:14px;min-width:54px;min-height:48px;font-weight:900;cursor:pointer}.modal-media{margin:16px 0;border-radius:18px;overflow:hidden;background:#050505}.modal-media img,.modal-media video{display:block;width:100%;max-height:54vh;object-fit:contain}.modal-text{font-size:1.15rem;line-height:1.55;color:#f1ede5}.modal-list{font-size:1.08rem;line-height:1.5;color:#f1ede5}.tagrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.tag{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);border-radius:999px;padding:8px 12px;color:#f2e4c4;font-weight:800}
    @media(max-width:1100px){#app{grid-template-rows:160px 1fr}.topbar{grid-template-columns:1fr}.controls,.controls.right{justify-content:center}.brand{order:-1}#teacherPanel{top:auto;bottom:14px}}
  </style>
</head>
<body>
<div id="bgLayer"></div>
<div id="app">
  <header class="topbar">
    <div class="controls"><button class="btn" id="fullBtn">⛶ Full Screen</button><button class="btn" id="teacherBtn">Teacher Controls</button></div>
    <div class="brand"><h1 id="boardTitle"></h1><p id="boardSubtitle"></p></div>
    <div class="controls right"><div class="dice-pill">🎲 <span id="miniDice">-</span></div></div>
  </header>
  <main id="board"></main>
</div>
<aside id="teacherPanel" class="hidden"></aside>
<div id="modal" class="hidden" aria-hidden="true"><div class="modal-card"><div class="modal-head"><h2 id="modalTitle"></h2><button class="close" id="closeModal">✕</button></div><div id="modalBody"></div></div></div>
<script>
/* =========================================================
   EDITABLE BOARD CONFIG
   Change text, colours, image/video paths, icons and tasks here.
   Put your own files in the assets folder and reference them like:
   assets/my-image.jpg or assets/my-video.mp4
   ========================================================= */
const BOARD_CONFIG={
  title:'Immersive Quest Board', subtitle:'Editable touch-friendly floor game template',
  theme:{accent:'#e3b04b',accent2:'#7ccf7a',border:'rgba(240,195,106,.78)',font:'Arial, Helvetica, sans-serif'},
  background:{type:'image',src:'assets/bg.svg'},
  options:{showTeacherControls:true,showDice:true,showTokens:true,enablePopups:true,allowFullscreen:true},
  centre:{type:'image',src:'assets/centre.svg',title:'Main Experience',subtitle:'Replace this centre artwork with your own image or video',badges:['Touch interaction','No scrolling','GitHub Pages ready','Editable content'],popup:{title:'Centre Panel',text:'Use this centre panel for the main theme, instructions, artwork, animated video, or lesson objective.',mediaType:'image',src:'assets/centre.svg',tags:['Main area','Image or video','Editable']}},
  specialPanels:[
    {title:'Feature Panel',subtitle:'Image or clue',type:'image',src:'assets/panel1.svg',icon:'🖼️',x:'3%',y:'12%',w:'18%',h:'30%',popup:{title:'Feature Panel',text:'This is a special clickable panel inside the centre artwork. It can hold an image, clue, task or prompt.',mediaType:'image',src:'assets/panel1.svg'}},
    {title:'Media Panel',subtitle:'Video-ready',type:'image',src:'assets/panel2.svg',icon:'🎬',x:'79%',y:'12%',w:'18%',h:'30%',popup:{title:'Media Panel',text:'Change this to a video by setting type to video and using an MP4 file path.',mediaType:'image',src:'assets/panel2.svg'}}
  ],
  cornerTiles:{
    bl:{title:'START',subtitle:'Begin here',type:'text',colour:'#29583a',icon:'▶',popup:{title:'Start',text:'Start the game here. Roll the dice and move around the board.'}},
    br:{title:'CHECKPOINT',subtitle:'Pause and reflect',type:'text',colour:'#6b4a1e',icon:'📍',popup:{title:'Checkpoint',text:'Use this space as a pause point, team discussion, or mini review.'}},
    tr:{title:'CHALLENGE',subtitle:'Special task',type:'text',colour:'#613636',icon:'⚡',popup:{title:'Special Challenge',text:'Add a special class challenge here.'}},
    tl:{title:'FINISH',subtitle:'Complete the quest',type:'text',colour:'#283f66',icon:'🏁',popup:{title:'Finish',text:'Finish tile. Use this for a final reflection or plenary task.'}}
  },
  topTiles:makeTiles('Top',1,8), rightTiles:makeTiles('Right',9,14), bottomTiles:makeTiles('Bottom',15,22), leftTiles:makeTiles('Left',23,28),
  tokens:[{id:'teamA',label:'A',colour:'#ff5757',position:0},{id:'teamB',label:'B',colour:'#3b82f6',position:0},{id:'teamC',label:'C',colour:'#22c55e',position:0},{id:'teamD',label:'D',colour:'#f59e0b',position:0}]
};
function makeTiles(side,start,end){
  const types=['Question','Task','Image','Video','Challenge','Discuss','Bonus','Reflect'];
  const icons=['❓','✅','🖼️','🎬','⚡','🗣️','🏆','💭'];
  const colours=['#60402a','#2f5061','#513b66','#315642','#694141','#5c5329','#3d4568','#365445'];
  const arr=[]; let n=0;
  for(let i=start;i<=end;i++){const ix=n%types.length;arr.push({title:`${side} ${n+1}`,subtitle:types[ix],type:i%3===0?'image':'text',src:`assets/tile${i}.svg`,colour:colours[ix],icon:icons[ix],popup:{title:`${side} Tile ${n+1}`,text:'Replace this with your own task, question, clue, instruction, image or video. This popup is designed for large touch screens and immersive floors.',mediaType:i%3===0?'image':undefined,src:i%3===0?`assets/tile${i}.svg`:undefined,list:['Edit this tile in the BOARD_CONFIG section.','Swap the image/video in the assets folder.','Change the title, subtitle, icon and task text.'],tags:[types[ix],side]}});n++;}
  return arr;
}
/* =========================================================
   APP CODE - you usually do not need to edit below this line
   ========================================================= */
const $=s=>document.querySelector(s);const board=$('#board');let rendered={top:[],right:[],bottom:[],left:[],corners:{}};let perimeter=[];let tokens=[];let selectedToken=null;let dice=1;
init();
function init(){tokens=(BOARD_CONFIG.tokens||[]).map(t=>({...t}));selectedToken=tokens[0]?.id||null;applyTheme();renderBackground();$('#boardTitle').textContent=BOARD_CONFIG.title;$('#boardSubtitle').textContent=BOARD_CONFIG.subtitle;renderBoard();renderTeacher();bindEvents();}
function applyTheme(){const t=BOARD_CONFIG.theme||{};if(t.accent)document.documentElement.style.setProperty('--accent',t.accent);if(t.accent2)document.documentElement.style.setProperty('--accent2',t.accent2);if(t.border)document.documentElement.style.setProperty('--border',t.border);if(t.font)document.documentElement.style.setProperty('--font',t.font)}
function renderBackground(){const bg=$('#bgLayer'),d=BOARD_CONFIG.background;bg.innerHTML='';if(!d||d.type==='none')return;if(d.type==='video'){let v=document.createElement('video');v.src=d.src;v.autoplay=v.loop=v.muted=v.playsInline=true;bg.append(v)}else{let img=document.createElement('img');img.src=d.src;bg.append(img)}}
function renderBoard(){board.innerHTML='';rendered={top:[],right:[],bottom:[],left:[],corners:{}};corner('tl',1,1);corner('tr',10,1);corner('br',10,8);corner('bl',1,8);row('top',BOARD_CONFIG.topTiles,2,1);col('right',BOARD_CONFIG.rightTiles,10,2);row('bottom',BOARD_CONFIG.bottomTiles,2,8);col('left',BOARD_CONFIG.leftTiles,1,2);center();buildPerimeter();renderTokens();}
function corner(k,c,r){let el=tile(BOARD_CONFIG.cornerTiles[k],true);el.style.gridColumn=c;el.style.gridRow=r;board.append(el);rendered.corners[k]=el}
function row(name,items,c0,r){(items||[]).forEach((d,i)=>{let el=tile(d);el.style.gridColumn=c0+i;el.style.gridRow=r;board.append(el);rendered[name].push(el)})}
function col(name,items,c,r0){(items||[]).forEach((d,i)=>{let el=tile(d);el.style.gridColumn=c;el.style.gridRow=r0+i;board.append(el);rendered[name].push(el)})}
function tile(d={},isCorner=false){let el=document.createElement('button');el.type='button';el.className=isCorner?'corner':'tile';if(d.colour)el.style.background=d.colour;media(el,d);el.append(overlay());let inn=document.createElement('div');inn.className='tile-inner';if(d.icon){let ic=document.createElement('div');ic.className='icon';ic.textContent=d.icon;inn.append(ic)}let title=document.createElement('div');title.className='title';title.textContent=d.title||'';inn.append(title);if(d.subtitle){let sub=document.createElement('div');sub.className='subtitle';sub.textContent=d.subtitle;inn.append(sub)}el.append(inn);if(BOARD_CONFIG.options.enablePopups&&d.popup)el.addEventListener('click',()=>openModal(d.popup));return el}
function center(){let d=BOARD_CONFIG.centre||{};let el=document.createElement('section');el.className='center';media(el,d);el.append(overlay());let content=document.createElement('div');content.className='center-content';content.innerHTML=`<div class="center-card"><h2>${esc(d.title||'')}</h2><p>${esc(d.subtitle||'')}</p></div><div class="badges">${(d.badges||[]).map(b=>`<div class="badge">${esc(b)}</div>`).join('')}</div>`;el.append(content);if(d.popup)el.addEventListener('click',()=>openModal(d.popup));(BOARD_CONFIG.specialPanels||[]).forEach(p=>{let pe=document.createElement('button');pe.type='button';pe.className='panel';pe.style.left=p.x;pe.style.top=p.y;pe.style.width=p.w;pe.style.height=p.h;media(pe,p);pe.append(overlay());let inn=document.createElement('div');inn.className='tile-inner';inn.innerHTML=`${p.icon?`<div class="icon">${esc(p.icon)}</div>`:''}<div class="title">${esc(p.title||'')}</div><div class="subtitle">${esc(p.subtitle||'')}</div>`;pe.append(inn);pe.addEventListener('click',e=>{e.stopPropagation();openModal(p.popup)});el.append(pe)});board.append(el)}
function media(el,d){if(!d||!d.src)return;if(d.type==='video'){let v=document.createElement('video');v.className='media';v.src=d.src;v.autoplay=v.loop=v.muted=v.playsInline=true;el.append(v)}else if(d.type==='image'){let img=document.createElement('img');img.className='media';img.src=d.src;img.alt=d.title||'';el.append(img)}}
function overlay(){let o=document.createElement('div');o.className='overlay';return o}
function buildPerimeter(){perimeter=[rendered.corners.bl,...rendered.bottom,rendered.corners.br,...[...rendered.right].reverse(),rendered.corners.tr,...[...rendered.top].reverse(),rendered.corners.tl,...rendered.left].filter(Boolean)}
function norm(p){let l=perimeter.length||1;return((p%l)+l)%l}
function renderTokens(){perimeter.forEach(t=>t.querySelector('.token-stack')?.remove());if(!BOARD_CONFIG.options.showTokens)return;perimeter.forEach((tile,i)=>{let here=tokens.filter(t=>norm(t.position)===i);if(!here.length)return;let st=document.createElement('div');st.className='token-stack';here.forEach(t=>{let tk=document.createElement('div');tk.className='token';tk.style.background=t.colour;tk.textContent=t.label;st.append(tk)});tile.append(st)})}
function renderTeacher(){if(!BOARD_CONFIG.options.showTeacherControls){$('#teacherBtn').classList.add('hidden');return}let p=$('#teacherPanel');p.innerHTML=`<h3>Teacher Controls</h3><p class="note">Roll dice, move team tokens and manage the activity from one panel.</p><div class="teacher-section"><h4>Token</h4><select class="select" id="tokenSelect">${tokens.map(t=>`<option value="${t.id}">${t.label} - ${t.id}</option>`).join('')}</select></div><div class="teacher-section"><h4>Dice</h4><div class="bigdice" id="bigDice">-</div><div class="grid2"><button class="btn" id="rollBtn">🎲 Roll</button><button class="btn" id="moveDiceBtn">Move by Dice</button></div></div><div class="teacher-section"><h4>Move Selected Token</h4><div class="grid4">${[-1,1,-2,2,-3,3,-6,6].map(n=>`<button class="btn move" data-n="${n}">${n>0?'+':''}${n}</button>`).join('')}</div></div><div class="teacher-section"><div class="grid2"><button class="btn" id="resetBtn">Reset</button><button class="btn" id="hideTeacher">Close</button></div><p class="note" id="status"></p></div>`;bindTeacher();updateStatus()}
function bindTeacher(){$('#tokenSelect').addEventListener('change',e=>{selectedToken=e.target.value;updateStatus()});$('#rollBtn').addEventListener('click',roll);$('#moveDiceBtn').addEventListener('click',()=>move(dice));$('#resetBtn').addEventListener('click',()=>{tokens.forEach(t=>t.position=0);renderTokens();updateStatus()});$('#hideTeacher').addEventListener('click',()=>$('#teacherPanel').classList.add('hidden'));document.querySelectorAll('.move').forEach(b=>b.addEventListener('click',()=>move(Number(b.dataset.n))))}
function roll(){dice=Math.floor(Math.random()*6)+1;$('#miniDice').textContent=dice;$('#bigDice').textContent=dice;updateStatus()}
function move(n){let t=tokens.find(x=>x.id===selectedToken);if(!t)return;t.position=norm(t.position+n);renderTokens();updateStatus()}
function updateStatus(){let s=$('#status'),t=tokens.find(x=>x.id===selectedToken);if(s&&t)s.textContent=`Selected: ${t.label} | Position: ${norm(t.position)} of ${perimeter.length-1} | Dice: ${dice}`}
function openModal(d={}){if(!BOARD_CONFIG.options.enablePopups)return;$('#modalTitle').textContent=d.title||'Task Card';let body='';if(d.mediaType==='image'&&d.src)body+=`<div class="modal-media"><img src="${d.src}" alt="${esc(d.title||'')}"></div>`;if(d.mediaType==='video'&&d.src)body+=`<div class="modal-media"><video src="${d.src}" controls autoplay loop muted playsinline></video></div>`;if(d.text)body+=`<p class="modal-text">${esc(d.text)}</p>`;if(d.list?.length)body+=`<ul class="modal-list">${d.list.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;if(d.tags?.length)body+=`<div class="tagrow">${d.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`;$('#modalBody').innerHTML=body;$('#modal').classList.remove('hidden');$('#modal').setAttribute('aria-hidden','false')}
function closeModal(){$('#modal').classList.add('hidden');$('#modal').setAttribute('aria-hidden','true')}
function bindEvents(){$('#teacherBtn').addEventListener('click',()=>$('#teacherPanel').classList.toggle('hidden'));$('#closeModal').addEventListener('click',closeModal);$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});$('#fullBtn').addEventListener('click',async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){console.warn(e)}});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});roll()}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
</script>
</body>
</html>
